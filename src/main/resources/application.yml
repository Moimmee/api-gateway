spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://user-service:9091
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=2

            - id: gathering-service
              uri: http://gathering-service:9092
              predicates:
                - Path=/parties/**
              filters:
                - StripPrefix=0
