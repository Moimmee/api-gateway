# develop 브랜치 머지 시 쿠버네티스 배포
name: Deploy to Kubernetes

on:
  push:
    branches:
      - develop

env:
  IMAGE_TAG: ${{ github.sha }}
  APP_NAME: api-gateway-image
  SERVICE_NAME: api-gateway

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew build -x test

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest

      - name: Copy Kubernetes YAMLs to Server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          
          # Deployment와 Service YAML만 서버로 복사
          scp -o StrictHostKeyChecking=no -i key.pem -P 1234 api-gateway-deployment.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/projects/moimmee/${{ env.SERVICE_NAME }}
          scp -o StrictHostKeyChecking=no -i key.pem -P 1234 api-gateway-service.yaml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/projects/moimmee/${{ env.SERVICE_NAME }}

      - name: Deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem

          # SSH 접속 후 Docker pull & Kubernetes 적용
          ssh -o StrictHostKeyChecking=no -i key.pem -p 1234 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ~/projects/moimmee/${{ env.SERVICE_NAME }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest
            kubectl apply -f api-gateway-config.yaml
            kubectl apply -f api-gateway-secret.yaml
            kubectl apply -f api-gateway-deployment.yaml
            kubectl apply -f api-gateway-service.yaml
          EOF

      - name: Notify Discord
        if: always()
        uses: Ilshidur/action-discord@master
        with:
          args: ${{ job.status == 'success' && '✅ 배포 성공!' || '❌ 배포 실패!' }} ${{ env.APP_NAME }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}